<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Circuit traces flowing into an Azure cloud running Active Directory Domain Services">
  <style>
    .flow {
      stroke-dasharray: 16 220;
      animation: flow 7s linear infinite;
    }
    .flow.f2 { animation-duration: 9s; animation-delay: -4s; }
    .flow.f3 { animation-duration: 8s; animation-delay: -2s; }
    @keyframes flow { to { stroke-dashoffset: -472; } }
    .pulse { animation: pulse 6s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.85; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1524"/>
      <stop offset="0.55" stop-color="#0b1712"/>
      <stop offset="1" stop-color="#090e0b"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a9bd8"/>
      <stop offset="0.6" stop-color="#5b9fd6"/>
      <stop offset="1" stop-color="#6fae8c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="rgba(140,190,180,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <circle cx="980" cy="60" r="260" fill="rgba(61,130,196,0.12)"/>
  <circle cx="180" cy="340" r="210" fill="rgba(111,174,140,0.09)"/>
  <circle cx="640" cy="210" r="230" fill="rgba(74,155,216,0.07)"/>

  <!-- static circuit traces: blue from left/top, green from right/bottom -->
  <g fill="none" stroke-linejoin="round">
    <g stroke="rgba(91,159,214,0.42)" stroke-width="2">
      <path d="M0 70 H210 L260 120 H500"/>
      <path d="M0 150 H150 L190 190 H478"/>
      <path d="M0 330 H176 L226 280 H250"/>
      <path d="M370 280 H455 L482 258"/>
      <path d="M420 0 V60 L470 110 V150"/>
      <path d="M560 0 V44 L600 84 V118"/>
      <path d="M120 0 V150 L170 200 V400" opacity="0.55"/>
      <path d="M64 400 V300 L104 260 V210" opacity="0.5"/>
    </g>
    <g stroke="rgba(111,174,140,0.4)" stroke-width="2">
      <path d="M1280 80 H1074 L1024 130 H1020"/>
      <path d="M910 118 H860 L826 152"/>
      <path d="M1280 210 H1100 L1060 250 H822"/>
      <path d="M1280 340 H1120 L1070 290 H845 L815 265"/>
      <path d="M760 0 V50 L720 90 V136"/>
      <path d="M1180 400 V250 L1130 200 V0" opacity="0.55"/>
      <path d="M1236 0 V120 L1196 160 V212" opacity="0.5"/>
      <path d="M300 400 V346 L350 296 H478"/>
      <path d="M900 400 V330 L862 292 H816"/>
      <path d="M1024 400 V352 L986 314" opacity="0.6"/>
    </g>
  </g>

  <!-- animated data pulses -->
  <g fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path class="flow" d="M0 70 H210 L260 120 H500" stroke="#7fc0ea" stroke-width="2.6"/>
    <path class="flow f2" d="M1280 210 H1100 L1060 250 H822" stroke="#6fd6a3" stroke-width="2.6"/>
    <path class="flow f3" d="M300 400 V346 L350 296 H478" stroke="#6fd6a3" stroke-width="2.6"/>
    <path class="flow f2" d="M420 0 V60 L470 110 V150" stroke="#7fc0ea" stroke-width="2.6"/>
  </g>

  <!-- via dots and pads -->
  <g fill="#5b9fd6" opacity="0.85">
    <circle cx="210" cy="70" r="4.5"/><circle cx="260" cy="120" r="4.5"/><circle cx="500" cy="70" r="0"/>
    <circle cx="150" cy="150" r="4.5"/><circle cx="190" cy="190" r="4.5"/>
    <circle cx="470" cy="110" r="4.5"/><circle cx="600" cy="84" r="4.5"/>
    <circle cx="170" cy="200" r="4.5"/><circle cx="104" cy="260" r="4.5"/>
  </g>
  <g fill="#6fae8c" opacity="0.85">
    <circle cx="1074" cy="80" r="4.5"/><circle cx="1024" cy="130" r="4.5"/>
    <circle cx="1100" cy="210" r="4.5"/><circle cx="1060" cy="250" r="4.5"/>
    <circle cx="1070" cy="290" r="4.5"/><circle cx="720" cy="90" r="4.5"/>
    <circle cx="1130" cy="200" r="4.5"/><circle cx="350" cy="296" r="4.5"/>
    <circle cx="862" cy="292" r="4.5"/><circle cx="986" cy="314" r="4.5"/><circle cx="1196" cy="160" r="4.5"/>
  </g>
  <g fill="none" stroke="rgba(140,190,214,0.5)" stroke-width="1.8">
    <rect x="252" y="113" width="14" height="14" rx="2"/>
    <rect x="1053" y="243" width="14" height="14" rx="2"/>
    <rect x="463" y="103" width="14" height="14" rx="2"/>
    <rect x="855" y="285" width="14" height="14" rx="2"/>
  </g>

  <!-- left chip: domain controller -->
  <g>
    <g stroke="rgba(91,159,214,0.55)" stroke-width="2">
      <line x1="268" y1="232" x2="268" y2="244"/><line x1="296" y1="232" x2="296" y2="244"/>
      <line x1="324" y1="232" x2="324" y2="244"/><line x1="268" y1="316" x2="268" y2="328"/>
      <line x1="296" y1="316" x2="296" y2="328"/><line x1="324" y1="316" x2="324" y2="328"/>
    </g>
    <rect x="240" y="244" width="130" height="72" rx="9" fill="#0d1b2b" stroke="#4a9bd8" stroke-width="2.5"/>
    <circle cx="256" cy="260" r="3.5" fill="#7fc0ea"/>
    <text x="305" y="278" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#9cc3e8">SS-DC-1</text>
    <text x="305" y="300" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12.5" fill="#6d8ba6">WinServer 2025</text>
  </g>

  <!-- right chip: client -->
  <g>
    <g stroke="rgba(111,174,140,0.55)" stroke-width="2">
      <line x1="948" y1="78" x2="948" y2="90"/><line x1="976" y1="78" x2="976" y2="90"/>
      <line x1="1004" y1="78" x2="1004" y2="90"/><line x1="948" y1="162" x2="948" y2="174"/>
      <line x1="976" y1="162" x2="976" y2="174"/><line x1="1004" y1="162" x2="1004" y2="174"/>
    </g>
    <rect x="920" y="90" width="120" height="72" rx="9" fill="#0e1a14" stroke="#6fae8c" stroke-width="2.5"/>
    <circle cx="936" cy="106" r="3.5" fill="#6fd6a3"/>
    <text x="980" y="124" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#a8c9b5">SS-CLIENT-1</text>
    <text x="980" y="146" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12.5" fill="#7a9686">Windows 10</text>
  </g>

  <!-- chip-to-cloud connections -->
  <g fill="none" stroke-linejoin="round">
    <path d="M370 280 H455 L482 258" stroke="rgba(91,159,214,0.42)" stroke-width="2"/>
    <path d="M920 126 H860 L826 152" stroke="rgba(111,174,140,0.4)" stroke-width="2"/>
  </g>

  <!-- pulsing halo behind cloud -->
  <path class="pulse" d="M470 215 a68 68 0 0 1 66-63 a86 86 0 0 1 164-19 a64 64 0 0 1 90 58 a54 54 0 0 1-9 108 H520 a60 60 0 0 1-50-84 Z"
    fill="none" stroke="#4a9bd8" stroke-width="10" opacity="0.4" filter="url(#glow)"/>

  <!-- central cloud -->
  <g filter="url(#glow)">
    <path d="M470 215 a68 68 0 0 1 66-63 a86 86 0 0 1 164-19 a64 64 0 0 1 90 58 a54 54 0 0 1-9 108 H520 a60 60 0 0 1-50-84 Z"
      fill="rgba(21,40,56,0.78)" stroke="url(#cloudGrad)" stroke-width="4"/>
  </g>
  <path d="M498 218 a60 60 0 0 1 58-55 a76 76 0 0 1 145-17 a56 56 0 0 1 79 51 a47 47 0 0 1-8 95 H542 a53 53 0 0 1-44-74 Z"
    fill="none" stroke="rgba(140,190,220,0.18)" stroke-width="1.8"/>

  <text x="668" y="233" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="34" font-weight="bold" fill="#d7e8f5">AD DS</text>
  <text x="668" y="262" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#8fb0c9">spiralspinners.com</text>
</svg>
